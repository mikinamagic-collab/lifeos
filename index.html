<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nina's LifeOS</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LifeOS">
<meta name="theme-color" content="#f7f7f5">
<style>
:root{color-scheme:light;
 --bg:#f8f9f8;--card:#fff;--ink:#2b3036;--muted:#9aa1a9;--line:#eceef0;
 --p1:#dd4b4b;--p2:#7c5bd2;--p3:#98a1ab;--p4:#9aa1a9;--over:#dd4b4b;--today:#e8912d;--soon:#5f9ee6;
 --work:#5b7fdb;--family:#e0679a;--home:#4cb782;--shop:#c99a2e;--read:#8a6bd1;--inbox:#8a8f98;--accent:#2b3036;
 --do:#dd4b4b;--plan:#4cb782;--deleg:#e8912d;--drop:#9aa1a9;
 --shadow:0 1px 3px rgba(20,24,28,.05);}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14.5px/1.6 "Avenir Next",Avenir,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:16px 16px 70px}
header{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 12px}
h1{font-size:19px;margin:0;font-weight:600;letter-spacing:0}
.date{color:var(--muted);font-size:13px}
.imp{margin-left:auto;font-size:12px;border:1px solid #e3e5e8;background:#fff;border-radius:7px;padding:6px 11px;cursor:pointer;box-shadow:0 1px 1px rgba(20,24,28,.03)}
.imp:hover{background:#f6f7f8}
.sub{display:none}
.tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;position:sticky;top:0;background:var(--bg);padding:6px 0;z-index:5}
.tab{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 13px;min-height:38px;display:inline-flex;align-items:center;font-size:13px;cursor:pointer;white-space:nowrap}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card h2{font-size:15px;margin:0 0 6px;font-weight:600}
.card .hint{color:var(--muted);font-size:12px;margin:0 0 12px}
.row{display:flex;align-items:flex-start;gap:10px;padding:9px 6px;border-radius:8px}
.row+.row{border-top:1px solid var(--line)}
.row:hover{background:#fafbfc}
.chk{flex:0 0 auto;width:22px;height:22px;border:1.5px solid #c6cbd1;border-radius:50%;cursor:pointer;margin-top:1px;position:relative;transition:border-color .15s}
.chk:hover{border-color:var(--home)}
.chk.sq{border-radius:5px}
.chk.p1{border-color:var(--p1)}.chk.p2{border-color:var(--p2)}.chk.p3{border-color:var(--p3)}
.chk.done{background:var(--home);border-color:var(--home)}
.chk.done:after{content:"✓";color:#fff;font-size:12px;position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.tbody{flex:1;min-width:0}
.ttl{font-size:14px;word-break:break-word;cursor:pointer}
.ttl:hover{text-decoration:underline dotted}
.ttl.done{text-decoration:line-through;color:var(--muted)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:4px}
.chip{font-size:11px;padding:2px 7px;border-radius:5px;background:#f2f3f5;color:#5f6670;white-space:nowrap}
.chip.area{color:#fff}.chip.over{background:#fdf0ef;color:#d14343}.chip.today{background:#fdf3e7;color:#cf7a1d}
.chip.soon{background:#eef5fd;color:#4a86c9}.chip.rec{background:#edf7f1;color:#3a9268}
.chip.q{color:#fff}.q-do{background:var(--do)}.q-plan{background:var(--plan)}.q-deleg{background:var(--deleg)}.q-drop{background:var(--drop)}
.tcard{background:#fff;border:1px solid #f0f0f0;border-radius:4px;padding:12px;margin:2px 2px 8px;box-shadow:0 1px 1px rgba(0,0,0,.1)}
.tcard:hover{background:#fff}
.tcard+.tcard{border-top:1px solid #f0f0f0}
.tcard .ttl{font-weight:500;color:#413f39}
.hdtime{font-size:10px;font-weight:600;color:#787878;margin-bottom:2px}
.trow{display:flex;gap:6px;align-items:flex-start}
.trow .ttl{flex:1;min-width:0}
.hdest{font-size:10px;font-weight:600;color:#787878;padding:2px 0 0;cursor:pointer;white-space:nowrap}
.hdest:hover{color:#413f39}
.duesub{font-size:11px;color:#787878;margin-top:2px}
.symrow{display:flex;gap:9px;align-items:center;margin-top:9px}
.cchk{flex:0 0 auto;width:17px;height:17px;border:1.5px solid #c8ccd1;border-radius:50%;cursor:pointer;transition:border-color .15s}
.cchk:hover{border-color:var(--home);background:#eef7f2}
.cchk.p1{border-color:var(--p1)}.cchk.p2{border-color:var(--p2)}
.sym{font-size:13px;line-height:1;color:#b4b4b4;cursor:pointer}
.symtxt{font-size:10px;font-weight:600;color:#b4b4b4}
.streamlbl{margin-left:auto;font-size:12px;font-weight:500;color:#787878;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48%}
.tcard .subsinline{display:block;margin-top:6px}
.acts{display:none;gap:6px;flex-wrap:wrap;margin-top:8px}
.row:hover .acts,.row.exp .acts{display:flex}
.rowtog{cursor:pointer;color:#c7c9cd;font-size:19px;line-height:1;flex:0 0 auto;margin-top:1px;padding:4px 6px}
.row:hover .rowtog{color:#9aa0a6}.row.exp .rowtog{color:var(--accent)}
.subsinline{display:none;margin-top:8px}
.row.exp .subsinline{display:block}
.subs2{padding-left:2px}
.subrow{display:flex;align-items:center;gap:9px;padding:4px 0;font-size:13px}
.subchk{width:18px;height:18px;border:1.5px solid #c6cbd1;border-radius:50%;cursor:pointer;flex:0 0 auto;position:relative}
.subchk.done{background:var(--home);border-color:var(--home)}
.subchk.done:after{content:'✓';color:#fff;font-size:11px;position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.subtxt.done{text-decoration:line-through;color:var(--muted)}
.subadd{display:flex;gap:6px;margin-top:6px}
.btn{font-size:12.5px;border:1px solid #e3e5e8;background:#fff;border-radius:7px;padding:7px 12px;min-height:34px;display:inline-flex;align-items:center;cursor:pointer;color:#4a5057;box-shadow:0 1px 1px rgba(20,24,28,.03)}
.btn:hover{background:#f6f7f8}.btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.p1{color:var(--p1)}.btn.p2{color:var(--p2)}.btn.p3{color:var(--p3)}
.star{cursor:pointer;font-size:19px;color:#d1d5db;flex:0 0 auto;margin-top:0;padding:3px 5px}.star.on{color:#f5b301}
.empty{color:var(--muted);font-size:13px;padding:10px 4px}
.stats{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px}
.stat{display:inline-flex;flex-direction:column;background:none;border:none;padding:2px 4px;min-width:64px}
.stat b{font-size:20px;font-weight:600}.stat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
/* add bar */
.addbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.addbar input,.addbar select,.modal input,.modal select{font:inherit;border:1px solid var(--line);border-radius:9px;padding:8px 10px;background:#fff}
.addbar input.t{flex:1;min-width:180px}
.addbar .go{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:8px 16px;cursor:pointer;font-weight:600}
/* board */
.board{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quad{border:1px solid var(--line);border-radius:12px;padding:10px;min-height:120px}
.quad h3{margin:0 0 3px;font-size:13px}.quad .qd{font-size:11px;color:var(--muted);margin:0 0 8px}
.quad.do{background:#fdf1f0;border-color:#f2c9c6}.quad.plan{background:#eef7f3;border-color:#bfe3d7}
.quad.deleg{background:#fdf4e7;border-color:#f6dcb8}.quad.drop{background:#f4f4f5;border-color:#e2e2e4}
.tk{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 8px;margin-bottom:6px;font-size:12.5px;display:flex;gap:6px;align-items:flex-start}
.tk .x{margin-left:auto;cursor:pointer;color:#bbb;font-size:13px}.tk .x:hover{color:var(--over)}
.tray{margin-top:12px}
.trayrow{display:flex;align-items:center;gap:8px;padding:6px 4px;border-top:1px solid var(--line);flex-wrap:wrap}
.trayrow .nm{flex:1;min-width:130px;font-size:13px}
.qbtn{font-size:11.5px;border:1px solid var(--line);border-radius:7px;padding:7px 10px;min-height:36px;cursor:pointer;background:#fff}
.qbtn.do{color:var(--do);border-color:#f2c9c6}.qbtn.plan{color:var(--plan);border-color:#bfe3d7}.qbtn.deleg{color:var(--deleg);border-color:#f6dcb8}.qbtn.drop{color:var(--drop)}
.seg-toggle{display:inline-flex;border:1px solid #e3e5e8;border-radius:8px;overflow:hidden;margin-bottom:12px;background:#fff;box-shadow:0 1px 1px rgba(20,24,28,.03)}
.seg-toggle button{border:none;background:#fff;padding:8px 15px;font:inherit;font-size:13px;color:#5f6670;cursor:pointer}
.seg-toggle button.on{background:var(--accent);color:#fff}
/* timeline / habits / wheel / projects / goals reused */
.tl{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}
.day{flex:0 0 132px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px;min-height:90px;box-shadow:var(--shadow)}
.day.tdy{border-color:var(--today);box-shadow:0 0 0 1px var(--today) inset}
.day h4{margin:0 0 6px;font-size:11.5px;color:var(--muted);font-weight:600;display:flex;justify-content:space-between}.day h4 b{color:var(--ink)}
.tlt{font-size:11.5px;background:#fff;border:1px solid var(--line);border-left:3px solid var(--soon);border-radius:6px;padding:3px 6px;margin-bottom:5px;word-break:break-word}
.tlt.over{border-left-color:var(--over)}.tlt.rec{border-left-color:var(--home)}
.hgrid{display:flex;flex-direction:column;gap:8px}.habit{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hname{flex:1;min-width:140px;font-size:13.5px}.week{display:flex;gap:4px}
.dot{width:22px;height:22px;border-radius:6px;background:#eef0f1;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)}
.dot.done{background:var(--home);color:#fff}.dot.tdy{outline:2px solid var(--today);outline-offset:1px}
.streak{font-size:12px;color:var(--muted);min-width:52px}
.area-h{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 2px}.area-h b{font-size:13.5px}.area-h .ct{color:var(--muted);font-size:12px;margin-left:auto}
.area-body{display:none;padding-left:4px}.area-body.open{display:block}
.pj{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}
.pj-h{display:flex;align-items:center;gap:9px;flex-wrap:wrap}.pj-h b{font-size:14.5px}
.pill{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600}
.pill.active{background:#e7f6ee;color:#177245}.pill.top{background:#fdeceb;color:#c0392b}.pill.hold{background:#f0f0f0;color:#777}.pill.new{background:#eef2ff;color:#3949ab}
.pj-note{color:var(--muted);font-size:12.5px;margin:5px 0 9px}
.prog{height:5px;background:#eef0f2;border-radius:99px;overflow:hidden;margin:6px 0 10px}.prog i{display:block;height:100%;background:var(--home);border-radius:99px}
.ms{display:flex;align-items:center;gap:9px;padding:5px 2px;font-size:13px}.ms .txt.done{text-decoration:line-through;color:var(--muted)}
.ms .send{margin-left:auto;font-size:10.5px;border:1px solid var(--line);background:#fff;border-radius:6px;padding:2px 7px;cursor:pointer;color:#555}
.principle{background:linear-gradient(135deg,#fff5f8,#f3f7ff);border:1px solid #f0e0ea;border-radius:12px;padding:12px 14px;margin-bottom:14px}.principle b{color:#b03a6a}
.gbig{display:flex;flex-wrap:wrap;gap:8px}.gbig span{background:#f4f6f8;border:1px solid var(--line);border-radius:10px;padding:7px 11px;font-size:12.5px}
.wheelwrap{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start}.mlist{flex:1;min-width:220px}.mlist h3{margin:2px 0 8px;font-size:14px}
.mitem{font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;background:#fafafa}.seg{cursor:pointer}.seg:hover{opacity:.85}.legend{font-size:11.5px;color:var(--muted);margin-top:8px}
.banner{background:#f2f7fd;border:1px solid #dbe8f7;border-radius:9px;padding:10px 13px;font-size:12.5px;color:#44618a;margin-bottom:14px}
.calnav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.calnav b{font-size:15px;flex:1}
.navb{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 11px;cursor:pointer;font:inherit}
.navb:hover{background:#f3f4f6}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .hd{font-size:11px;color:var(--muted);text-align:center;padding:2px 0;font-weight:600}
.cell{min-height:80px;border:1px solid var(--line);border-radius:8px;padding:4px;background:#fff;overflow:hidden;cursor:pointer}
.cell.wk{min-height:150px}
.cell.out{background:#fafafa}.cell.out .dn{color:#c3c6ca}
.cell.tdy{border-color:var(--today);box-shadow:0 0 0 1px var(--today) inset}
.cell .dn{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:2px}
.cell.tdy .dn{color:var(--today)}
.ev{font-size:10.5px;border-radius:4px;padding:1px 4px;margin-top:2px;background:#eef2ff;color:#33415c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.ev.bd{background:#fdf1f6;color:#a03a6a}
.ev.tk{background:#eef7f2;color:#1f6b52}.ev.tk.over{background:#fdeceb;color:#b0362c}
.more{font-size:10px;color:var(--muted);margin-top:2px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#2b3036;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:40;max-width:90%}
.toast.act{pointer-events:auto}
.toast.show{opacity:1}
/* v20 navigation */
#sideNav{position:fixed;left:0;top:0;bottom:0;width:204px;background:#fbfbfc;border-right:1px solid var(--line);padding:16px 12px;z-index:20;overflow-y:auto}
#sideNav .brand{font-weight:600;font-size:15px;padding:4px 11px 14px;letter-spacing:.01em}
.snav{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:8px;font-size:13.5px;cursor:pointer;color:#4a5057;margin-bottom:2px}
.snav .ic{filter:grayscale(1);opacity:.72}.snav.active .ic,.snav:hover .ic{filter:none;opacity:1}
.snav:hover{background:#f0f1f3}.snav.active{background:#eceef1;color:var(--ink);font-weight:600}
.snav .ic{font-size:16px;width:20px;text-align:center}
#sideNav hr{border:none;border-top:1px solid var(--line);margin:10px 6px}
.navlab{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:8px 11px 4px;font-weight:600}
.ritdone{margin-left:auto;color:var(--home);font-weight:700;font-size:13px}
@media(min-width:561px){.wrap{margin-left:216px;margin-right:16px;max-width:1000px}}
#botNav{display:none;position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);z-index:30;padding:6px 4px calc(6px + env(safe-area-inset-bottom));justify-content:space-around}
.bnav{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#9aa1a9;padding:4px 8px;border-radius:8px;cursor:pointer;min-width:54px}
.bnav .ic{filter:grayscale(1);opacity:.75}.bnav.active .ic{filter:none;opacity:1}
.bnav .ic{font-size:20px;line-height:1}
.bnav.active{color:var(--accent);font-weight:700}
/* v31 */
.notetext{display:none;font-size:12.5px;color:var(--muted);margin-top:6px;white-space:pre-wrap;border-left:2px solid var(--line);padding-left:8px}
.row.exp .notetext{display:block}
.hlbar{background:linear-gradient(135deg,#fffbe8,#fdf3e7);border:1px solid #f2e2b3;border-radius:9px;padding:9px 12px;font-size:13.5px;margin:0 0 10px}
/* v29 planning page */
.planwrap{display:grid;grid-template-columns:290px 1fr 320px;gap:16px;align-items:start}
@media(max-width:960px){.planwrap{grid-template-columns:1fr}}
.planh{font-size:19px;font-weight:600;margin:0 0 6px}
/* modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:380px;box-shadow:0 10px 40px rgba(20,24,28,.16)}
.modal h3{margin:0 0 12px;font-size:15px}
.modal label{display:block;font-size:12px;color:var(--muted);margin:8px 0 3px}
.modal input,.modal select{width:100%}
.modal input[type=checkbox]{width:auto;flex:0 0 auto}
.modal .mrow{display:flex;gap:8px}.modal .mrow>*{flex:1}
.modal .mbtns{display:flex;gap:8px;margin-top:16px}
.modal .save{flex:1;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:9px;cursor:pointer;font-weight:600}
.modal .del{background:#fff;color:var(--over);border:1px solid #f2c9c6;border-radius:9px;padding:9px 12px;cursor:pointer}
.modal .cancel{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 12px;cursor:pointer}
@media(max-width:560px){.board{grid-template-columns:1fr}
.btn{min-height:44px;padding:10px 12px}.qbtn{min-height:44px}.chk{width:26px;height:26px}.cchk{width:22px;height:22px}.sym{font-size:16px}.star{font-size:21px}
.row:hover .acts{display:none}.row.exp .acts{display:flex}
#sideNav{display:none}#botNav{display:flex}.wrap{margin-left:0;padding:12px 12px 92px}}
</style>
</head>
<body>
<nav id="sideNav"></nav>
<div class="wrap">
  <header>
    <h1>Nina's LifeOS</h1><span class="date" id="dateStr"></span>
    <span id="syncChip" style="margin-left:auto;font-size:12px;color:var(--muted)">⚪ ikke sat op</span>
    <button class="imp" id="ghBtn" style="margin-left:0">⚙️ Sync</button>
  </header>
  <p class="sub">Dit opgavesystem — synkroniseret privat via GitHub. Virker på Mac og iPhone.</p>
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>
<div id="modalHost"></div>
<nav id="botNav"></nav>
<script>
let PROJECTS=[
 {id:"inbox",name:"Inbox",color:"#8a8f98"}
];
function catOf(id){return PROJECTS.find(p=>p.id===id)||{name:'Uden kategori',color:'#9aa0a6'};}
function catByName(n){const lc=String(n).toLowerCase();const f=PROJECTS.find(p=>p.name.toLowerCase()===lc);return f?f.id:(PROJECTS[0]&&PROJECTS[0].id);}
const T="2026-07-06";
const RAW={};

let UID=1;
const LS={g(k,d){try{return JSON.parse(localStorage.getItem('cc2_'+k))??d}catch(e){return d}},s(k,v){localStorage.setItem('cc2_'+k,JSON.stringify(v))}};
/* ===== GitHub sync layer ===== */
const NOSYNC=new Set(['cc2_tab','cc2_pmode','cc2_tlview','cc2_catopen','cc2_navlast']);
const GH={cfg:JSON.parse(localStorage.getItem('lifeos_gh')||'null'),sha:null,timer:null,status:'off',lastSync:0};
function ghUrl(){return 'https://api.github.com/repos/'+GH.cfg.owner+'/'+GH.cfg.repo+'/contents/data.json';}
function ghHdr(){return {Authorization:'Bearer '+GH.cfg.token,Accept:'application/vnd.github+json'};}
function b64e(s){return btoa(unescape(encodeURIComponent(s)));}
function b64d(s){return decodeURIComponent(escape(atob(s.replace(/\s/g,''))));}
function collectKeys(){const o={};Object.keys(localStorage).forEach(k=>{if(k.startsWith('cc2_')&&!NOSYNC.has(k)){try{o[k]=JSON.parse(localStorage.getItem(k))}catch(e){}}});return o;}
function applyKeys(keys){Object.keys(localStorage).forEach(k=>{if(k.startsWith('cc2_')&&!NOSYNC.has(k))localStorage.removeItem(k);});for(const k in keys)if(k.startsWith('cc2_'))localStorage.setItem(k,JSON.stringify(keys[k]));}
function updateChip(){const c=document.getElementById('syncChip');if(!c)return;
 const map={off:'⚪ ikke sat op',ok:'🟢 synk.',sync:'🔄 synkroniserer…',pend:'🟠 gemmer…',err:'🔴 synk-fejl',new:'🟡 første synk. venter',conflict:'⚠️ konflikt — vælg version'};
 c.textContent=map[GH.status]||GH.status;}
// ---------- v35: push-guard + auto-opfriskning (rene beslutningsfunktioner) ----------
function conflictChoiceNeeded(st,retry,hasRemoteTasks){return (st===409||st===422)&&!retry&&!!hasRemoteTasks;}
function wakeNeedsCheck(lastSyncMs,nowMs,status){return status==='ok'&&(nowMs-lastSyncMs)>=600000;}
function ghPullAsync(){ // async pull at boot with the same safety guards (incl. empty-over-full)
 if(!GH.cfg)return Promise.resolve();
 const timeout=new Promise(res=>setTimeout(()=>res('timeout'),12000));
 const go=fetch(ghUrl(),{headers:ghHdr()}).then(r=>r.ok?r.json().then(j=>({st:200,j})):{st:r.status}).catch(()=>null);
 return Promise.race([go,timeout]).then(res=>{
  if(res==='timeout'||!res){GH.status='err';return;}
  if(res.st===200){const j=res.j;GH.sha=j.sha;GH.lastSync=Date.now();
   const data=JSON.parse(b64d(j.content));const rk=data&&data.keys?data.keys:null;const rTasks=rk&&rk.cc2_tasks&&rk.cc2_tasks.length;const lTasks=(LS.g('tasks',[])||[]).length;if(rk&&(rTasks||!lTasks)){applyKeys(rk);GH.status='ok';}else if(rk){GH.status='pend';setTimeout(()=>ghPush(false),1200);}else{GH.status='ok';}}
  else if(res.st===404){GH.status='new';}
  else GH.status='err';
 }).catch(()=>{GH.status='err';});}
function ghPush(retry){if(!GH.cfg)return;GH.status='sync';updateChip();
 const body={message:'lifeos sync '+new Date().toISOString(),
  content:b64e(JSON.stringify({updated:new Date().toISOString(),keys:collectKeys()},null,1))};
 if(GH.sha)body.sha=GH.sha;
 fetch(ghUrl(),{method:'PUT',headers:ghHdr(),body:JSON.stringify(body)})
 .then(r=>r.json().then(j=>({ok:r.ok,st:r.status,j})))
 .then(({ok,st,j})=>{
  if(ok){GH.sha=j.content.sha;GH.status='ok';GH.lastSync=Date.now();updateChip();}
  else if((st===409||st===422)&&!retry){
   fetch(ghUrl(),{headers:ghHdr()}).then(r=>r.json()).then(k=>{
    let rk=null;try{rk=JSON.parse(b64d(k.content)).keys;}catch(e){}
    if(conflictChoiceNeeded(st,retry,rk&&rk.cc2_tasks)){GH.status='conflict';updateChip();conflictModal({sha:k.sha,keys:rk});}
    else{GH.sha=k.sha;ghPush(true);}});}
  else{GH.status='err';updateChip();}})
 .catch(()=>{GH.status='err';updateChip();});}

 const host=document.getElementById('modalHost');if(!host)return;
 const rT=(remote.keys.cc2_tasks||[]).length,lT=(LS.g('tasks',[])||[]).length;
 host.innerHTML='<div class="mbg" id="cfBg"><div class="modal"><h3>⚠️ Nyere data findes</h3><p style="font-size:13px">En anden enhed har gemt nyere data siden denne skærm sidst blev opdateret (<b>'+rT+'</b> opgaver dér · <b>'+lT+'</b> her).</p><p class="hint">Anbefalet: hent nyeste. Kun denne skærms allerseneste ændring går tabt — og intet slettes fra historikken (🕘 Gendan tidligere version).</p><div class="mbtns"><button class="cancel" id="cfOver">Overskriv med denne skærms data</button><button class="save" id="cfPull">🔄 Hent nyeste (anbefalet)</button></div></div></div>';
 document.getElementById('cfPull').onclick=()=>{applyKeys(remote.keys);GH.sha=remote.sha;host.innerHTML='';location.reload();};
 document.getElementById('cfOver').onclick=()=>{host.innerHTML='';GH.sha=remote.sha;ghPush(true);};
}

function wakeCheck(){
 if(!GH.cfg||!wakeNeedsCheck(GH.lastSync||0,Date.now(),GH.status))return;
 const ae=document.activeElement;if(ae&&['INPUT','TEXTAREA','SELECT'].includes(ae.tagName))return;
 const mh=document.getElementById('modalHost');if(mh&&mh.innerHTML)return;
 GH.lastSync=Date.now();
 fetch(ghUrl(),{headers:ghHdr()}).then(r=>r.ok?r.json():null)
 .then(j=>{if(j&&j.sha&&GH.sha&&j.sha!==GH.sha)location.reload();}).catch(()=>{});}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')wakeCheck();});
window.addEventListener('focus',()=>wakeCheck());

function dueBucket(t){if(!t.due)return null;if(t.due<TODAY)return 'over';if(t.due===TODAY)return 'today';return (new Date(t.due)-today)/86400000<=7?'soon':'later';}
function score(t){const b=dueBucket(t);let s=0;if(b==='over')s=1000;else if(b==='today')s=900;else if(b==='soon')s=700;else if(b==='later')s=300;const q={do:120,plan:80,deleg:40,drop:-20}[t.q]||0;const pr={p1:80,p2:50,p3:-15}[t.pri]||0;return s+q+pr;}

// ---------- events / birthdays ----------
function evNext(e){const y=today.getFullYear();if(e.type==='event')return e.iso?new Date(e.iso+'T00:00:00'):null;let d=new Date(y+'-'+e.md+'T00:00:00');if(isNaN(d))return null;if(d<today)d=new Date((y+1)+'-'+e.md+'T00:00:00');return d;}
function evDays(e){const n=evNext(e);if(!n)return 99999;return Math.round((n-today)/86400000);}
function evAge(e){if(e.type!=='bday'||!e.y)return null;const n=evNext(e);return n?n.getFullYear()-e.y:null;}
function evByDate(ds){return EVENTS.filter(e=>{const n=evNext(e);return n&&iso(n)===ds;});}
function evIcon(e){return e.type==='bday'?'🎂':'📌';}
function evUpcoming(days){return EVENTS.filter(e=>{const d=evDays(e);return d>=0&&d<=days;}).sort((a,b)=>evDays(a)-evDays(b));}


// ---------- task row ----------
function chAllDone(t){return t.children&&t.children.length&&t.children.every(c=>c.done);}
function newSid(){return 's'+Date.now().toString(36)+Math.floor(Math.random()*10000);}
function completeTask(t){t.done=true;t.doneAt=TODAY;t.star=false;
 if(!t.rep)return null;
 const nd=repNext(t.due,t.rep,TODAY);if(!nd)return null;
 const cp={id:'t'+(UID++),content:t.content,pid:t.pid,due:nd,time:t.time||null,rec:null,rep:t.rep,pri:t.pri||null,q:null,imp:null,eff:null,est:t.est||null,note:t.note||null,done:false,star:false,src:'me'};
 if(t.children&&t.children.length)cp.children=t.children.map(c=>({id:newSid(),txt:c.txt,done:false}));
 STORE.unshift(cp);t.repNext=cp.id;return nd;}
function uncompleteTask(t){t.done=false;delete t.doneAt;
 if(t.repNext){const i=STORE.findIndex(x=>x.id===t.repNext&&!x.done);if(i>=0)STORE.splice(i,1);delete t.repNext;}}
function chToggle(t,c){c.done=!c.done;if(chAllDone(t)){const nd=completeTask(t);toast('Alle deltrin fuldført ✓'+(nd?' — næste: '+fmtDue(nd):''));}save();}
function chAdd(t,txt){if(!t.children)t.children=[];t.children.push({id:newSid(),txt:txt,done:false});save();}
function chDel(t,c){t.children=(t.children||[]).filter(x=>x!==c);save();}

  r.appendChild(cb);r.appendChild(tx);r.appendChild(dl);wrap.appendChild(r);});

 inp.onkeydown=e=>{e.stopPropagation();if(e.key==='Enter'&&inp.value.trim()){chAdd(t,inp.value.trim());onChange();}};

function textOn(bg){if(typeof bg!=='string'||bg.charAt(0)!=='#')return '#fff';let h=bg.slice(1);if(h.length===3)h=h.split('').map(c=>c+c).join('');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);const L=(0.299*r+0.587*g+0.114*b)/255;return L>0.6?'#22262b':'#fff';}
function pushTrash(entries){const tr=LS.g('trash',[]);const now=Date.now();entries.forEach(e=>tr.push({type:e.type,item:e.item,at:now}));LS.s('trash',tr);}
function pruneTrash(){const tr=LS.g('trash',[]);const cut=Date.now()-2592000000;const keep=tr.filter(x=>x.at>=cut);if(keep.length!==tr.length)LS.s('trash',keep);}

function delTasks(list,label){if(!list||!list.length)return;const ids=new Set(list.map(t=>t.id));STORE=STORE.filter(t=>!ids.has(t.id));list.forEach(t=>SEL.delete(t.id));pushTrash(list.map(t=>({type:'task',item:t})));save();toastUndo(label||(list.length>1?list.length+' opgaver slettet':'Slettet'),()=>{list.forEach(t=>STORE.unshift(t));LS.s('trash',LS.g('trash',[]).filter(x=>!(x.type==='task'&&ids.has(x.item.id))));save();render();});render();}

// ---------- F1: natural-language quick add ----------
const CATCOLORS=['#5b7fdb','#e0679a','#2fa38a','#c99a2e','#8a6bd1','#d1453b','#2f86a3','#a3662f'];
function fmtDue(d){try{return new Date(d+'T00:00:00').toLocaleDateString('da-DK',{weekday:'short',day:'numeric',month:'short'});}catch(e){return d;}}
function parseQuickAdd(raw,commit){
 let s=' '+raw+' ';let pri=null,due=null,time=null,pid=null,newCatName=null,est=null;
 s=s.replace(/\s~(\d+(?:[.,]\d+)?)\s*(t|h|m|min)?\b/i,(m,num,unit)=>{const v=parseFloat(String(num).replace(',','.'));est=(unit&&unit.toLowerCase().startsWith('m'))?Math.round(v):Math.round(v*60);if(!unit&&v<=8)est=Math.round(v*60);return ' ';});
 s=s.replace(/\s!p([123])\b/i,(m,n)=>{pri='p'+n;return ' ';});
 s=s.replace(/\s#([\p{L}\d_-]+)/u,(m,name)=>{
   const lc=name.toLowerCase();
   const found=PROJECTS.find(p=>p.name.toLowerCase()===lc)||PROJECTS.find(p=>p.name.toLowerCase().startsWith(lc)||lc.startsWith(p.name.toLowerCase()))||PROJECTS.find(p=>p.name.toLowerCase().includes(lc)||lc.includes(p.name.toLowerCase()))||PROJECTS.find(p=>lc.length>=3&&p.name.toLowerCase().slice(0,Math.min(4,lc.length))===lc.slice(0,Math.min(4,lc.length)));
   if(found){pid=found.id;}
   else if(commit){const np={id:'c'+Date.now(),name:name.charAt(0).toUpperCase()+name.slice(1),color:CATCOLORS[PROJECTS.length%CATCOLORS.length]};PROJECTS.push(np);saveCats();pid=np.id;}
   else{newCatName=name.charAt(0).toUpperCase()+name.slice(1);}
   return ' ';});
 s=s.replace(/\s(?:kl\.?\s*)?([01]?\d|2[0-3])[:.]([0-5]\d)\b/i,(m,h,mi)=>{time=String(h).padStart(2,'0')+':'+mi;return ' ';});
 if(!time)s=s.replace(/\skl\.?\s*([01]?\d|2[0-3])\b/i,(m,h)=>{time=String(h).padStart(2,'0')+':00';return ' ';});
 const rel=[[/\si\s?overmorgen\b/i,2],[/\bday after tomorrow\b/i,2],[/\si\s?morgen\b/i,1],[/\btomorrow\b/i,1],[/\si\s?dag\b/i,0],[/\btoday\b/i,0],[/\bn[æa]ste uge\b/i,7],[/\bnext week\b/i,7]];
 let hit=false;
 for(const it of rel){if(it[0].test(s)){const dd=new Date(today);dd.setDate(dd.getDate()+it[1]);due=iso(dd);s=s.replace(it[0],' ');hit=true;break;}}
 if(!hit){const days={'søndag':0,sondag:0,sunday:0,mandag:1,monday:1,tirsdag:2,tuesday:2,onsdag:3,wednesday:3,torsdag:4,thursday:4,fredag:5,friday:5,'lørdag':6,lordag:6,saturday:6};
  const wdre=/\s(?:p[åa] |on |n[æa]ste |next )?(søndag|sondag|sunday|mandag|monday|tirsdag|tuesday|onsdag|wednesday|torsdag|thursday|fredag|friday|lørdag|lordag|saturday)\b/i;
  const mm=s.match(wdre);
  if(mm){const targ=days[mm[1].toLowerCase()];const dd=new Date(today);let add=(targ-dd.getDay()+7)%7;if(add===0)add=7;dd.setDate(dd.getDate()+add);due=iso(dd);s=s.replace(wdre,' ');hit=true;}}
 if(!hit){const dre=/\s(\d{1,2})[\/.](\d{1,2})(?:[\/.](\d{2,4}))?\b/;const mm=s.match(dre);
  if(mm){const dd=+mm[1],mo=+mm[2];if(mo>=1&&mo<=12&&dd>=1&&dd<=31){let yr=mm[3]?+mm[3]:today.getFullYear();if(yr<100)yr+=2000;let dt=new Date(yr,mo-1,dd);if(!mm[3]&&dt<today)dt=new Date(yr+1,mo-1,dd);due=iso(dt);s=s.replace(dre,' ');hit=true;}}}
 if(time&&!due)due=TODAY;
 const content=s.replace(/\s+/g,' ').trim();
 return {content,due,time,pri,pid,newCatName,est};
}

let SECEDIT=false;
function sectionReorder(w){
 const tab=LS.g('tab','dash');
 const kids=[...w.children];
 const cards=kids.filter(el=>el.classList&&el.classList.contains('card')&&el.dataset&&el.dataset.skey);
 if(cards.length<2)return;
 const key='secord_'+tab;const saved=LS.g(key,[]);
 const rank=c=>{const i=saved.indexOf(c.dataset.skey);return i<0?1000+cards.indexOf(c):i;};
 const ordered=cards.slice().sort((a,b)=>rank(a)-rank(b));
 const slots=[];kids.forEach((el,i)=>{if(cards.indexOf(el)>=0)slots.push(i);});
 const arr=kids.slice();slots.forEach((s,n)=>{arr[s]=ordered[n];});
 arr.forEach(el=>w.appendChild(el));
 const tb=document.createElement('div');tb.style.cssText='display:flex;justify-content:flex-end;margin:0 0 8px';
 const bt=document.createElement('button');bt.className='btn';bt.textContent=SECEDIT?'✓ Færdig':'⇅ Flyt sektioner';if(SECEDIT){bt.style.cssText='background:var(--accent);color:#fff;border-color:var(--accent)';}bt.onclick=()=>{SECEDIT=!SECEDIT;render();};tb.appendChild(bt);
 w.insertBefore(tb,w.firstChild);
 if(!SECEDIT)return;
 const vis=new Set(cards.map(x=>x.dataset.skey));
 const commit=list=>{const tail=saved.filter(k=>!vis.has(k));LS.s(key,list.map(x=>x.dataset.skey).concat(tail));render();};
 ordered.forEach((c,n)=>{
  c.style.position='relative';c.style.outline='2px dashed var(--accent)';c.style.outlineOffset='2px';
  const ctl=document.createElement('div');ctl.style.cssText='position:absolute;top:6px;right:6px;display:flex;gap:4px;z-index:6';
  const mk=(txt,dis,fn)=>{const b=document.createElement('button');b.textContent=txt;b.disabled=dis;b.style.cssText='width:30px;height:30px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:'+(dis?'default':'pointer')+';font-size:15px;font-weight:700;line-height:1;opacity:'+(dis?'.35':'1')+';box-shadow:0 1px 3px rgba(0,0,0,.12)';if(!dis)b.onclick=e=>{e.stopPropagation();fn();};return b;};
  ctl.appendChild(mk('↑',n===0,()=>{const a=ordered.slice();[a[n-1],a[n]]=[a[n],a[n-1]];commit(a);}));
  ctl.appendChild(mk('↓',n===ordered.length-1,()=>{const a=ordered.slice();[a[n+1],a[n]]=[a[n],a[n+1]];commit(a);}));
  c.appendChild(ctl);
 });
}

function projectDay(plan,now,endMin,busyExtra){
 const DAYSTART=7*60;const busy=(busyExtra||[]).map(b=>[b[0],b[1]]);const placed=[];const overflow=[];
 plan.forEach(t=>{if(t.done)return;if(t.time){const hm=t.time.split(':');const start=(+hm[0])*60+(+hm[1]);const dur=t.est||30;busy.push([start,start+dur]);placed.push({id:t.id,start,dur,fixed:true});}});
 busy.sort((a,b)=>a[0]-b[0]);
 let cur=Math.max(now,DAYSTART);
 plan.forEach(t=>{if(t.time||t.done)return;const dur=t.est||30;
  let st=cur,moved=true;
  while(moved){moved=false;for(const b of busy){if(st<b[1]&&st+dur>b[0]){st=b[1];moved=true;}}}
  if(st+dur<=endMin){placed.push({id:t.id,start:st,dur,fixed:false});busy.push([st,st+dur]);busy.sort((a,b)=>a[0]-b[0]);cur=st+dur;}
  else overflow.push(t.id);});
 return {placed,overflow};
}

function repParse(rule){const m=/^(\d+)([dwmy])$/.exec(rule||'');const n=m?+m[1]:0;return (m&&n>0)?{n:n,u:m[2]}:null;}
function repNext(due,rule,todayIso){const p=repParse(rule);if(!p)return null;
 let d=new Date((due||todayIso)+'T12:00');if(isNaN(d.getTime()))d=new Date(todayIso+'T12:00');
 const dom=d.getDate();
 const step=()=>{if(p.u==='d')d.setDate(d.getDate()+p.n);
  else if(p.u==='w')d.setDate(d.getDate()+7*p.n);
  else if(p.u==='m'){d.setDate(1);d.setMonth(d.getMonth()+p.n);d.setDate(Math.min(dom,new Date(d.getFullYear(),d.getMonth()+1,0).getDate()));}
  else{d.setDate(1);d.setFullYear(d.getFullYear()+p.n);d.setDate(Math.min(dom,new Date(d.getFullYear(),d.getMonth()+1,0).getDate()));}};
 const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
 let guard=0;do{step();guard++;}while(fmt(d)<=todayIso&&guard<1000);
 return fmt(d);}

 s=s.replace(/\s#([\p{L}\d_-]+)/u,(m,name)=>{const lc=name.toLowerCase();
  const found=projects.find(p=>p.name.toLowerCase()===lc)||projects.find(p=>p.name.toLowerCase().startsWith(lc))||projects.find(p=>p.name.toLowerCase().includes(lc));
  if(found)f.pid=found.id;return ' ';});
 f.text=s.replace(/\s+/g,' ').trim().toLowerCase();
 return f;}

 if(f.when==='uge'){if(!t.due)return false;const mon=weekMonday(todayIso);const d=new Date(mon+'T12:00');d.setDate(d.getDate()+6);const sun=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(t.due<mon||t.due>sun)return false;}

 if(f.when==='udendato'&&t.due)return false;

 return true;}

function habitStreak(t,done){
 const FR=LS.g('hfreeze',{m:'',used:0,bridged:{}});FR.bridged=FR.bridged||{};
 const cm=TODAY.slice(0,7);if(FR.m!==cm){FR.m=cm;FR.used=0;}
 const allow=gapAllow(t.rec);
 const ds=[...new Set(done)].sort().reverse();
 if(!ds.length)return{n:0,frozen:false,best:LS.g('hbest',{})[t.id]||0};
 const day=s=>Math.round(new Date(s+'T12:00').getTime()/864e5);
 let frozen=false,n=0;
 const gap0=day(TODAY)-day(ds[0]);
 if(gap0<=allow){n=1;}
 else if(gap0===allow+1){const key=t.id+':'+ds[0];
  if(FR.bridged[key]){n=1;frozen=true;}
  else if(FR.used<2){FR.used++;FR.bridged[key]=true;LS.s('hfreeze',FR);n=1;frozen=true;}
 }
 if(n===0)return{n:0,frozen:false,best:LS.g('hbest',{})[t.id]||0};
 for(let i=1;i<ds.length;i++){const g=day(ds[i-1])-day(ds[i]);
  if(g<=allow){n++;continue;}
  if(g===allow+1){const key=t.id+':'+ds[i];
   if(FR.bridged[key]){n++;continue;}
   if(FR.used<2){FR.used++;FR.bridged[key]=true;LS.s('hfreeze',FR);n++;continue;}}
  break;}
 const best=LS.g('hbest',{});if(n>(best[t.id]||0)){best[t.id]=n;LS.s('hbest',best);}
 return{n,frozen,best:best[t.id]||n};
}

function exportJson(){const out={exported:new Date().toISOString(),app:'lifeos',keys:collectKeys()};return JSON.stringify(out,null,1);}

 const keys=d.keys||d;let n=0;for(const k in keys)if(k.startsWith('cc2_'))n++;
 if(!n){toast('⚠️ Ingen data fundet i den fil');return;}
 applyKeys(keys);toast('Importeret ✓ — synkroniserer & genindlæser…');
 if(GH.cfg){GH.status='pend';updateChip();ghPush(false);const t0=Date.now();const iv=setInterval(()=>{if(GH.status==='ok'){clearInterval(iv);location.reload();}else if(GH.status==='err'||Date.now()-t0>25000){clearInterval(iv);toast('⚠️ Cloud-synk fejlede — data er gemt i denne browser. Åbn ⚙️ og prøv igen.');updateChip();}},300);}
 else setTimeout(()=>location.reload(),800);}

 .then(r=>{if(!r.ok)throw 0;return r.json();})
 .then(j=>{const data=JSON.parse(b64d(j.content));const keys=data&&data.keys;if(!keys)throw 0;

  const warn=(!nT&&curT)?'<p style="font-size:13px;color:var(--over)">⚠️ Denne version er TOM — dine nuværende '+curT+' opgaver ville blive erstattet af ingenting. Er du helt sikker?</p>':'';

  document.getElementById('rpBg').onclick=e=>{if(e.target.id==='rpBg')restoreModal();};
  document.getElementById('rpX').onclick=restoreModal;
  document.getElementById('rpGo').onclick=()=>{
   applyKeys(keys);toast('Gendannet ✓ — synkroniserer & genindlæser…');
   GH.status='pend';updateChip();ghPush(false);
   const t0=Date.now();const iv=setInterval(()=>{if(GH.status==='ok'){clearInterval(iv);location.reload();}else if(GH.status==='err'||Date.now()-t0>25000){clearInterval(iv);toast('⚠️ Synk fejlede — versionen er gendannet i denne browser. Åbn ⚙️ og prøv igen.');updateChip();}},300);};})
 .catch(()=>{toast('⚠️ Kunne ikke hente den version');restoreModal();});
}

 ];

 let sel=0,items=[];
 const highlight=()=>{[...list.children].forEach((d,i)=>d.classList.toggle('active',i===sel));};

  CMDS.forEach(c=>{if(!q||c.l.toLowerCase().includes(q))items.push(c);});

(function boot(){
 const appEl=document.getElementById('app');
 const start=()=>{try{initApp();}catch(e){appEl.innerHTML='<div class="empty" style="padding:24px;text-align:center">⚠️ Fejl ved indlæsning — prøv at genindlæse siden.</div>';throw e;}};
 if(GH.cfg){
  appEl.innerHTML='<div class="empty" style="padding:24px;text-align:center">🔄 Henter dine data…</div>';
  GH.status='sync';updateChip();
  ghPullAsync().then(()=>{if(GH.status==='new'&&Object.keys(collectKeys()).length)setTimeout(()=>ghPush(false),1500);if(GH.status==='sync')GH.status='ok';updateChip();start();});
 }else start();
})();
</script>
</body>
</html>
